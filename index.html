function PulsingDot({col,size=7}){
const [on,setOn]=useState(true);
useEffect(()=>{const t=setInterval(()=>setOn(v=>!v),650);return()=>clearInterval(t);},[]);
return <div style={{width:size,height:size,borderRadius:'50%',flexShrink:0,background:on?col:'transparent',border:`1.5px solid ${col}`,boxShadow:on?`0 0 5px ${col}`:undefined,transition:'all .25s'}}/>;
}

function Bar({pct,col}){
return(
<div style={{marginTop:6}}>
<div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
<span style={{fontSize:7.5,color:'#1e2c3e',letterSpacing:1,fontFamily:'monospace'}}>CRISIS SCORE</span>
<span style={{fontSize:9,fontWeight:700,color:col,fontFamily:'monospace'}}>{pct}/100</span>
</div>
<div style={{height:5,background:'rgba(0,0,0,0.6)',borderRadius:3,overflow:'hidden',position:'relative'}}>
<div style={{width:`${pct}%`,height:'100%',background:`linear-gradient(90deg,${col}44,${col})`,boxShadow:`0 0 6px ${col}44`,borderRadius:3}}/>
{[25,50,75].map(t=><div key={t} style={{position:'absolute',left:`${t}%`,top:0,bottom:0,width:1,background:'rgba(255,255,255,0.05)'}}/>)}
</div>
</div>
);
}

<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:2}}>
<div style={{display:'flex',alignItems:'center',gap:5}}>
<span style={{fontSize:17}}>{c.flag}</span>
<span style={{fontSize:11,fontWeight:700,color:'#c5d5e8'}}>{c.name}</span>
</div>
<div style={{display:'flex',alignItems:'center',gap:4}}>
<PulsingDot col={col}/>
<span style={{fontSize:7,fontWeight:700,color:col,letterSpacing:.8,fontFamily:'monospace'}}>{c.sev}</span>
</div>
</div>
<div style={{fontSize:8,color:'#3a4858',lineHeight:1.45,marginBottom:3}}>{c.hl}</div>
<Bar pct={c.crisis} col={col}/>
{hover&&(

function MapView(){
const ref=useRef(null);
const inst=useRef(null);
const [rdy,setRdy]=useState(false);
useEffect(()=>{
if(!document.getElementById('lfcss')){const l=document.createElement('link');l.id='lfcss';l.rel='stylesheet';l.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';document.head.appendChild(l);}
if(!window.L){const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';s.onload=()=>setRdy(true);document.head.appendChild(s);}else setRdy(true);
},[]);
useEffect(()=>{
if(!rdy||!ref.current||inst.current)return;
const L=window.L;
const map=L.map(ref.current,{center:[25.5,52],zoom:5,scrollWheelZoom:true,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
const ps=document.createElement('style');ps.textContent=`.gp .leaflet-popup-content-wrapper,.gp .leaflet-popup-tip{background:transparent;border:none;box-shadow:none;padding:0;}.gp .leaflet-popup-content{margin:0;}`;document.head.appendChild(ps);
GCC.forEach(g=>{
const icon=L.divIcon({className:'',iconSize:[40,40],iconAnchor:[20,20],html:`<div style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center"><div style="position:absolute;inset:0;border-radius:50%;border:2px solid ${g.col};animation:ring 1.6s ease-out infinite;opacity:.5"></div><div style="width:12px;height:12px;border-radius:50%;background:${g.col};box-shadow:0 0 10px ${g.col};z-index:2;position:relative"></div></div><style>@keyframes ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.6);opacity:0}}</style>`});
const popHtml=`<div style="background:#020810;border:1.5px solid ${g.col}77;border-radius:12px;padding:13px 15px;min-width:260px;max-width:295px;font-family:system-ui,sans-serif;color:#d0e0f0;box-shadow:0 16px 50px rgba(0,0,0,0.98);"><div style="display:flex;align-items:center;gap:8px;margin-bottom:9px"><span style="font-size:20px">${g.flag}</span><div><div style="font-size:13px;font-weight:800">${g.name}</div><div style="font-size:8px;letter-spacing:2px;color:${g.col};font-weight:700;margin-top:1px">${g.status}</div></div></div><div style="background:${g.col}10;border:1px solid ${g.col}28;border-radius:7px;padding:7px 9px;margin-bottom:8px;font-size:9px;color:#6a7a9a;line-height:1.6">${g.detail}</div>${g.facts.map(f=>`<div style="font-size:8px;color:#4a5a70;margin-bottom:2px">• ${f}</div>`).join('')}<div style="font-size:7.5px;color:#1e2838;margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.05)">📰 ${g.src}</div></div>`;
L.marker([g.lat,g.lng],{icon}).bindPopup(L.popup({maxWidth:300,className:'gp',closeButton:true,offset:[0,-6]}).setContent(popHtml)).addTo(map);
});
inst.current=map;
},[rdy]);
return <div ref={ref} style={{height:300,borderRadius:10,overflow:'hidden',border:'1px solid rgba(0,60,120,0.2)'}}/>;
}
