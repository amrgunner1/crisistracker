function RealMap(){
  const mapRef=useRef(null);
  const mapInstance=useRef(null);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    if(!document.getElementById('leaflet-css')){
      const link=document.createElement('link');link.id='leaflet-css';link.rel='stylesheet';
      link.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(link);
    }
    if(!window.L){
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      s.onload=()=>setReady(true);document.head.appendChild(s);
    } else setReady(true);
  },[]);
  useEffect(()=>{
    if(!ready||!mapRef.current||mapInstance.current)return;
    const L=window.L;
    const map=L.map(mapRef.current,{center:[27,46],zoom:5,zoomControl:true,scrollWheelZoom:true,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
    const css=document.createElement('style');
    css.textContent=`.gcc-popup .leaflet-popup-content-wrapper{background:transparent;border:none;box-shadow:0 8px 40px rgba(0,0,0,0.9);padding:0;border-radius:14px;}.gcc-popup .leaflet-popup-content{margin:0;border-radius:14px;overflow:visible;}.gcc-popup .leaflet-popup-tip-container{display:none;}.leaflet-container{background:#04080f;font-family:'Inter',system-ui,sans-serif;}.leaflet-popup{z-index:9999!important;}.leaflet-pane.leaflet-popup-pane{z-index:9999!important;}`;
    document.head.appendChild(css);
    gcc.forEach(c=>{
      const pulse=c.status==="HALTED"||c.status==="DISRUPTED";
      const icon=L.divIcon({className:'',
        html:`<div style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;">${pulse?`<div style="position:absolute;inset:0;border-radius:50%;border:2px solid ${c.col};animation:ping 1.5s ease-out infinite;opacity:0.7;"></div>`:''}<div style="width:16px;height:16px;border-radius:50%;background:${c.col};border:2px solid ${c.col}bb;box-shadow:0 0 14px ${c.col},0 0 5px ${c.col};z-index:2;position:relative;"></div></div><style>@keyframes ping{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.6);opacity:0}}</style>`,
        iconSize:[40,40],iconAnchor:[20,20]});
      const html=`<div style="background:#060f1c;border:1.5px solid ${c.col}99;border-radius:14px;padding:18px;min-width:270px;max-width:320px;font-family:'Inter',system-ui,sans-serif;color:#e0e8f0;box-shadow:0 8px 40px rgba(0,0,0,0.95);">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px;"><span style="font-size:24px;">${c.emoji}</span><div><div style="font-weight:800;font-size:15px;color:#eef4ff;">${c.name}</div><div style="font-size:10px;letter-spacing:2px;font-weight:700;color:${c.col};margin-top:1px;">${c.status}</div></div></div>
        <div style="background:${c.col}18;border:1px solid ${c.col}55;border-radius:9px;padding:9px 12px;margin-bottom:11px;"><div style="font-size:11px;font-weight:700;color:${c.col};margin-bottom:4px;">⚠️ ${c.headline}</div><div style="font-size:10px;color:#8898a8;line-height:1.65;">${c.detail}</div></div>
        <div style="font-size:10px;color:#6070a0;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,0.08);">📊 ${c.exports}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">${c.keyFacts.map(f=>`<div style="font-size:9px;color:#8090a0;background:rgba(255,255,255,0.04);border-radius:6px;padding:5px 8px;line-height:1.4;">• ${f}</div>`).join('')}</div></div>`;
      L.marker([c.lat,c.lng],{icon}).bindPopup(L.popup({maxWidth:330,className:'gcc-popup',closeButton:true,offset:[0,-10]}).setContent(html)).addTo(map);
    });
    mapInstance.current=map;
  },[ready]);
  return(
    <div style={{margin:"14px 0",background:"rgba(4,12,22,0.97)",border:"1px solid rgba(255,100,0,0.22)",borderRadius:18,padding:"16px 18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"monospace",fontSize:12,color:"#ff8800",letterSpacing:2}}>⚡ GCC SOURCE NATIONS — DAY 6 STATUS · Click markers for full detail</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          {[{col:"#ff2222",l:"HALTED"},{col:"#ff7700",l:"DISRUPTED"},{col:"#ffaa00",l:"REDUCED"}].map((x,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:x.col}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:x.col,boxShadow:`0 0 5px ${x.col}`}}/>{x.l}
            </div>
          ))}
        </div>
      </div>
      <div ref={mapRef} style={{height:360,borderRadius:12,overflow:"hidden",border:"1px solid rgba(0,100,160,0.2)"}}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginTop:12}}>
        {gcc.map((c,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,0.4)",borderRadius:9,padding:"9px 10px",borderLeft:`3px solid ${c.col}`}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
              <span style={{fontSize:13}}>{c.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,color:"#c0d0e0"}}>{c.name}</span>
              <span style={{marginLeft:"auto",fontSize:8,color:c.col,fontWeight:700,fontFamily:"monospace"}}>{c.status}</span>
            </div>
            <div style={{fontSize:9,color:"#ff9966",lineHeight:1.4}}>{c.headline}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TankGauge({level}){
  const fill=level>=50?"#22cc55":level>=35?"#ffcc00":level>=20?"#ff8800":"#ff3333";
  return(
    <div style={{position:"relative",height:13,background:"rgba(0,0,0,0.55)",borderRadius:7,border:"1px solid rgba(255,255,255,0.09)",overflow:"hidden",margin:"6px 0"}}>
      <div style={{width:`${level}%`,height:"100%",background:`linear-gradient(90deg,${fill}77,${fill})`,borderRadius:7}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(255,255,255,0.18),transparent)",borderRadius:7}}/>
      </div>
      {[25,50,75].map(t=><div key={t} style={{position:"absolute",left:`${t}%`,top:0,bottom:0,width:1,background:"rgba(255,255,255,0.1)"}}/>)}
    </div>
  );
}

function Blink({col}){
  const [on,setOn]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setOn(v=>!v),750);return()=>clearInterval(t);},[]);
  return <div style={{width:9,height:9,borderRadius:"50%",background:on?col:"transparent",border:`2px solid ${col}`,boxShadow:on?`0 0 7px ${col}`:"none",transition:"all 0.3s",flexShrink:0}}/>;
}

}

function ChatBox(){
  const [comments,setComments]=useState(SAMPLE_COMMENTS);
  const [name,setName]=useState("");
  const [country,setCountry]=useState("");
  const [text,setText]=useState("");
  const [error,setError]=useState("");
  const [success,setSuccess]=useState(false);
  const [liked,setLiked]=useState({});
  const allCountries=["Qatar","UAE","Saudi Arabia","Kuwait","Bahrain","Egypt","Japan","S. Korea","India","China","Pakistan","Bangladesh","Taiwan","Singapore","Thailand","France","UK","EU Bloc","Global"];
  function submit(){
    setError("");setSuccess(false);
    if(!name.trim()){setError("Please enter your name or handle.");return;}
    if(!country){setError("Please select a country or region.");return;}
    if(text.trim().length<30){setError("Please write at least 30 characters with substantive energy analysis.");return;}
    if(text.trim().length>600){setError("Please keep your analysis under 600 characters.");return;}
    if(containsBlocked(text)||containsBlocked(name)){setError("⚠️ Comment blocked. Please focus on energy economics, supply/demand analysis, and industry impacts only. Political statements and offensive language are not permitted.");return;}
    if(containsPolitical(text)){setError("⚠️ Please keep comments focused on energy market analysis — no political statements, no government blame. Energy economics only.");return;}
    setComments(prev=>[{country,user:name.trim(),text:text.trim(),time:"Just now",likes:0},...prev]);
    setName("");setCountry("");setText("");setSuccess(true);
    setTimeout(()=>setSuccess(false),4000);
  }
  function like(i){
    if(liked[i])return;
    setLiked(prev=>({...prev,[i]:true}));
    setComments(prev=>prev.map((c,idx)=>idx===i?{...c,likes:c.likes+1}:c));
  }
  const cCol={"Japan":"#ff2222","S. Korea":"#ff2222","Pakistan":"#ff1111","Bangladesh":"#ff1111","Taiwan":"#ff2222","India":"#ff8800","China":"#ff8800","Singapore":"#ffcc00","Thailand":"#ffcc00","France":"#ffcc00","UK":"#44cc77","EU Bloc":"#ffcc00","Qatar":"#ff2222","UAE":"#ff7700","Saudi Arabia":"#ffaa00","Kuwait":"#ff6600","Bahrain":"#ff9900","Egypt":"#ff4400","Global":"#44aaff"};
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:"1px solid rgba(0,150,200,0.25)",borderRadius:18,padding:"22px 24px",marginBottom:20}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#44aaff",letterSpacing:2,marginBottom:4}}>💬 ANALYST COMMUNITY — Energy Projections & Market Analysis</div>
      <div style={{fontSize:11,color:"#405060",marginBottom:20,lineHeight:1.6}}>Share supply/demand analysis, reserve timelines, price projections, or industry impact assessments. <span style={{color:"#ff8844"}}>Energy economics only — no political statements, no offensive language, no government blame. Auto-moderated.</span></div>
      <div style={{background:"rgba(0,0,0,0.35)",borderRadius:14,padding:"18px 20px",marginBottom:20,border:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <label style={{fontSize:10,color:"#607080",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:5}}>Your Name / Handle</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. A. Tanaka, LNG Analyst" maxLength={40}
              style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:"#e0e8f0",fontSize:12,outline:"none",fontFamily:"inherit"}}
              onFocus={e=>e.target.style.borderColor="rgba(0,150,255,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}/>
          </div>
          <div>
            <label style={{fontSize:10,color:"#607080",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:5}}>Country / Region Focus</label>
            <select value={country} onChange={e=>setCountry(e.target.value)}
              style={{width:"100%",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:country?cCol[country]||"#e0e8f0":"#506070",fontSize:12,outline:"none",fontFamily:"inherit",cursor:"pointer"}}>
              <option value="">Select country or region...</option>
              {allCountries.map(c=><option key={c} value={c} style={{color:"#e0e8f0",background:"#060f1c"}}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,color:"#607080",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:5}}>Your Energy Analysis</label>
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={4} maxLength={600}
            placeholder="Focus on: LNG/oil volumes, price projections, reserve timelines, industry impact, Suez/shipping analysis, historical precedents...&#10;&#10;Avoid: political opinions, government blame, offensive language."
            style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"10px 12px",color:"#e0e8f0",fontSize:12,outline:"none",fontFamily:"inherit",resize:"vertical",lineHeight:1.6}}
            onFocus={e=>e.target.style.borderColor="rgba(0,150,255,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:9,color:"#304050"}}>Min 30 · Max 600 characters · Energy analysis only</span>
            <span style={{fontSize:9,color:text.length>550?"#ff6644":text.length>400?"#ffaa44":"#304050"}}>{text.length}/600</span>
          </div>
        </div>
        {error&&<div style={{background:"rgba(255,50,50,0.12)",border:"1px solid rgba(255,50,50,0.3)",borderRadius:8,padding:"9px 12px",fontSize:11,color:"#ff7766",marginBottom:12,lineHeight:1.5}}>{error}</div>}
        {success&&<div style={{background:"rgba(50,200,100,0.12)",border:"1px solid rgba(50,200,100,0.3)",borderRadius:8,padding:"9px 12px",fontSize:11,color:"#44cc77",marginBottom:12}}>✓ Your analysis has been posted. Thank you for contributing.</div>}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{fontSize:10,color:"#304050"}}>🛡️ Auto-moderated · Political content blocked · Energy analysis only</div>
          <button onClick={submit} style={{padding:"10px 24px",background:"linear-gradient(135deg,rgba(0,100,200,0.4),rgba(0,60,140,0.4))",border:"1px solid rgba(0,150,255,0.4)",borderRadius:10,color:"#44aaff",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1,fontFamily:"monospace"}}
            onMouseEnter={e=>e.target.style.background="linear-gradient(135deg,rgba(0,120,240,0.5),rgba(0,80,180,0.5))"}
            onMouseLeave={e=>e.target.style.background="linear-gradient(135deg,rgba(0,100,200,0.4),rgba(0,60,140,0.4))"}>
            POST ANALYSIS →
          </button>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {comments.map((c,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.05)",borderLeft:`3px solid ${cCol[c.country]||"#44aaff"}`,animation:i===0&&c.time==="Just now"?"slideIn 0.3s ease":"none"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:`${cCol[c.country]||"#44aaff"}22`,border:`1px solid ${cCol[c.country]||"#44aaff"}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:cCol[c.country]||"#44aaff",flexShrink:0}}>
                  {c.user.charAt(0).toUpperCase()}
                </div>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:"#c0d0e0"}}>{c.user}</span>
                  <span style={{fontSize:10,color:"#506070",marginLeft:6}}>on</span>
                  <span style={{fontSize:10,fontWeight:700,color:cCol[c.country]||"#44aaff",marginLeft:4,padding:"2px 8px",background:`${cCol[c.country]||"#44aaff"}18`,borderRadius:6,border:`1px solid ${cCol[c.country]||"#44aaff"}33`}}>{c.country}</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:10,color:"#304050"}}>{c.time}</span>
                <button onClick={()=>like(i)} style={{display:"flex",alignItems:"center",gap:4,background:liked[i]?"rgba(0,150,255,0.15)":"rgba(255,255,255,0.05)",border:`1px solid ${liked[i]?"rgba(0,150,255,0.3)":"rgba(255,255,255,0.08)"}`,borderRadius:8,padding:"4px 10px",cursor:liked[i]?"default":"pointer",color:liked[i]?"#44aaff":"#506070",fontSize:10,fontWeight:600}}>
                  👍 {c.likes}
                </button>
              </div>
            </div>
            <div style={{fontSize:11,color:"#9098b0",lineHeight:1.7}}>{c.text}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Divider({label,col}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0 10px"}}>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
      <span style={{fontSize:10,color:"#405060",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
    </div>
  );
}
