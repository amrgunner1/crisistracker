// ─── CRISIS BAR COMPONENT ────────────────────────────────────────────
// crisis: 0–100. High = full red bar (crisis). Low = thin green bar (stable).
function CrisisBar({crisis}){
  // Color: 0–30 green, 31–55 yellow, 56–75 orange, 76–100 red
  const col=crisis>=76?"#ff2222":crisis>=56?"#ff8800":crisis>=31?"#ffcc00":"#22cc55";
  const glow=crisis>=76?`0 0 8px ${col}99`:`0 0 4px ${col}55`;
  const isAnimated=crisis>=76;
  return(
    <div style={{marginTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
        <span style={{fontSize:8,color:"#304050",fontFamily:"monospace",letterSpacing:1}}>CRISIS LEVEL</span>
        <span style={{fontSize:9,fontFamily:"monospace",fontWeight:700,color:col}}>{crisis>=76?"CRITICAL":crisis>=56?"HIGH":crisis>=31?"MODERATE":"STABLE"}</span>
      </div>
      <div style={{position:"relative",height:8,background:"rgba(0,0,0,0.6)",borderRadius:4,border:"1px solid rgba(255,255,255,0.07)",overflow:"hidden"}}>
        <div style={{
          width:`${crisis}%`,height:"100%",
          background:`linear-gradient(90deg,${col}88,${col})`,
          borderRadius:4,
          boxShadow:glow,
          animation:isAnimated?"barPulse 1.4s ease-in-out infinite":"none",
          transition:"width 0.5s ease"
        }}/>
        {/* Tick marks */}
        {[25,50,75].map(t=>(
          <div key={t} style={{position:"absolute",left:`${t}%`,top:0,bottom:0,width:1,background:"rgba(255,255,255,0.08)"}}/>
        ))}
      </div>
    </div>
  );
}

function Blink({col}){
  const [on,setOn]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setOn(v=>!v),750);return()=>clearInterval(t);},[]);
  return <div style={{width:8,height:8,borderRadius:"50%",background:on?col:"transparent",border:`2px solid ${col}`,boxShadow:on?`0 0 6px ${col}`:"none",transition:"all 0.3s",flexShrink:0}}/>;
}

function ChatBox(){
  const [comments,setComments]=useState(SAMPLE_COMMENTS);
  const [name,setName]=useState("");const [country,setCountry]=useState("");const [text,setText]=useState("");
  const [error,setError]=useState("");const [success,setSuccess]=useState(false);const [liked,setLiked]=useState({});
  const allCountries=["Qatar","UAE","Saudi Arabia","Kuwait","Bahrain","Egypt","Japan","S. Korea","India","China","Pakistan","Bangladesh","Taiwan","Singapore","Thailand","France","UK","EU Bloc","Global"];
  function submit(){
    setError("");setSuccess(false);
    if(!name.trim()){setError("Please enter your name.");return;}
    if(!country){setError("Please select a country.");return;}
    if(text.trim().length<30){setError("Please write at least 30 characters of substantive energy analysis.");return;}
    if(text.trim().length>600){setError("Please keep under 600 characters.");return;}
    if(containsBlocked(text)||containsBlocked(name)){setError("⚠️ Comment blocked. Please focus on energy economics and supply/demand analysis only. Political statements and offensive language are not permitted.");return;}
    const polPhrases=["government should","must attack","whose fault","criminal policy","incompetent","wrong policy"];
    if(polPhrases.some(w=>text.toLowerCase().includes(w))){setError("⚠️ Please focus on energy market analysis only — no political statements.");return;}
    setComments(prev=>[{country,user:name.trim(),text:text.trim(),time:"Just now",likes:0},...prev]);
    setName("");setCountry("");setText("");setSuccess(true);
    setTimeout(()=>setSuccess(false),4000);
  }
  function like(i){if(liked[i])return;setLiked(p=>({...p,[i]:true}));setComments(p=>p.map((c,idx)=>idx===i?{...c,likes:c.likes+1}:c));}
  const cCol={"Japan":"#ff2222","S. Korea":"#ff2222","Pakistan":"#ff1111","Bangladesh":"#ff1111","Taiwan":"#ff2222","India":"#ff8800","China":"#ff8800","Singapore":"#ffcc00","Thailand":"#ffcc00","France":"#ffcc00","UK":"#44cc77","EU Bloc":"#ffcc00","Qatar":"#ff2222","UAE":"#ff7700","Saudi Arabia":"#ffaa00","Kuwait":"#ff6600","Bahrain":"#ff9900","Egypt":"#ff5500","Global":"#44aaff"};
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:"1px solid rgba(0,150,200,0.25)",borderRadius:18,padding:"22px 24px",marginBottom:20}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#44aaff",letterSpacing:2,marginBottom:4}}>💬 ANALYST COMMUNITY — Energy Market Projections & Analysis</div>
      <div style={{fontSize:11,color:"#405060",marginBottom:20,lineHeight:1.6}}>Share supply/demand analysis, reserve timelines, price projections, or industry impact assessments. <span style={{color:"#ff8844"}}>Energy economics only — no political statements, no offensive language.</span> Auto-moderated.</div>
      <div style={{background:"rgba(0,0,0,0.35)",borderRadius:14,padding:"18px 20px",marginBottom:20,border:"1px solid rgba(255,255,255,0.07)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
          <div>
            <label style={{fontSize:10,color:"#607080",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:5}}>Your Name / Handle</label>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. A. Tanaka, LNG Analyst" maxLength={40}
              style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:"#e0e8f0",fontSize:12,outline:"none",fontFamily:"inherit"}}
              onFocus={e=>e.target.style.borderColor="rgba(0,150,255,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}/>
          </div>
          <div>
            <label style={{fontSize:10,color:"#607080",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:5}}>Country / Region Focus</label>
            <select value={country} onChange={e=>setCountry(e.target.value)}
              style={{width:"100%",background:"rgba(0,0,0,0.6)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"9px 12px",color:country?cCol[country]||"#e0e8f0":"#506070",fontSize:12,outline:"none",fontFamily:"inherit",cursor:"pointer"}}>
              <option value="">Select country or region...</option>
              {allCountries.map(c=><option key={c} value={c} style={{color:"#e0e8f0",background:"#060f1c"}}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,color:"#607080",letterSpacing:1,textTransform:"uppercase",display:"block",marginBottom:5}}>Your Energy Analysis</label>
          <textarea value={text} onChange={e=>setText(e.target.value)} rows={4} maxLength={600}
            placeholder="Focus on: LNG/oil volumes, price projections, reserve timelines, industry impact, historical precedents...&#10;Avoid: political opinions, government blame, offensive language."
            style={{width:"100%",background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"10px 12px",color:"#e0e8f0",fontSize:12,outline:"none",fontFamily:"inherit",resize:"vertical",lineHeight:1.6}}
            onFocus={e=>e.target.style.borderColor="rgba(0,150,255,0.4)"} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{fontSize:9,color:"#304050"}}>Min 30 · Max 600 characters</span>
            <span style={{fontSize:9,color:text.length>550?"#ff6644":text.length>400?"#ffaa44":"#304050"}}>{text.length}/600</span>
          </div>
        </div>
        {error&&<div style={{background:"rgba(255,50,50,0.12)",border:"1px solid rgba(255,50,50,0.3)",borderRadius:8,padding:"9px 12px",fontSize:11,color:"#ff7766",marginBottom:12,lineHeight:1.5}}>{error}</div>}
        {success&&<div style={{background:"rgba(50,200,100,0.12)",border:"1px solid rgba(50,200,100,0.3)",borderRadius:8,padding:"9px 12px",fontSize:11,color:"#44cc77",marginBottom:12}}>✓ Analysis posted. Thank you.</div>}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{fontSize:10,color:"#304050"}}>🛡️ Auto-moderated · Political content blocked · Energy analysis only</div>
          <button onClick={submit} style={{padding:"10px 24px",background:"linear-gradient(135deg,rgba(0,100,200,0.4),rgba(0,60,140,0.4))",border:"1px solid rgba(0,150,255,0.4)",borderRadius:10,color:"#44aaff",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:1,fontFamily:"monospace"}}
            onMouseEnter={e=>e.target.style.background="linear-gradient(135deg,rgba(0,120,240,0.5),rgba(0,80,180,0.5))"}
            onMouseLeave={e=>e.target.style.background="linear-gradient(135deg,rgba(0,100,200,0.4),rgba(0,60,140,0.4))"}>
            POST ANALYSIS →
          </button>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {comments.map((c,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,0.3)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.05)",borderLeft:`3px solid ${cCol[c.country]||"#44aaff"}`,animation:i===0&&c.time==="Just now"?"slideIn 0.3s ease":"none"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:32,height:32,borderRadius:"50%",background:`${cCol[c.country]||"#44aaff"}22`,border:`1px solid ${cCol[c.country]||"#44aaff"}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:cCol[c.country]||"#44aaff",flexShrink:0}}>
                  {c.user.charAt(0).toUpperCase()}
                </div>
                <div>
                  <span style={{fontSize:12,fontWeight:700,color:"#c0d0e0"}}>{c.user}</span>
                  <span style={{fontSize:10,color:"#506070",marginLeft:6}}>on</span>
                  <span style={{fontSize:10,fontWeight:700,color:cCol[c.country]||"#44aaff",marginLeft:4,padding:"2px 8px",background:`${cCol[c.country]||"#44aaff"}18`,borderRadius:6,border:`1px solid ${cCol[c.country]||"#44aaff"}33`}}>{c.country}</span>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:10,color:"#304050"}}>{c.time}</span>
                <button onClick={()=>like(i)} style={{display:"flex",alignItems:"center",gap:4,background:liked[i]?"rgba(0,150,255,0.15)":"rgba(255,255,255,0.05)",border:`1px solid ${liked[i]?"rgba(0,150,255,0.3)":"rgba(255,255,255,0.08)"}`,borderRadius:8,padding:"4px 10px",cursor:liked[i]?"default":"pointer",color:liked[i]?"#44aaff":"#506070",fontSize:10,fontWeight:600}}>
                  👍 {c.likes}
                </button>
              </div>
            </div>
            <div style={{fontSize:11,color:"#9098b0",lineHeight:1.7}}>{c.text}</div>
          </div>
        ))}
      </div>
    </div>
  );
}
