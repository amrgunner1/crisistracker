function RealMap(){
  const mapRef=useRef(null);
  const mapInstance=useRef(null);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    if(!document.getElementById('leaflet-css')){
      const link=document.createElement('link');
      link.id='leaflet-css';link.rel='stylesheet';
      link.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(link);
    }
    if(!window.L){
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      script.onload=()=>setReady(true);
      document.head.appendChild(script);
    } else setReady(true);
  },[]);

  useEffect(()=>{
    if(!ready||!mapRef.current||mapInstance.current)return;
    const L=window.L;
    const map=L.map(mapRef.current,{center:[27,42],zoom:5,zoomControl:true,scrollWheelZoom:true,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);

    // Inject popup styles
    const style=document.createElement('style');
    style.textContent=`
      .gcc-popup .leaflet-popup-content-wrapper{background:transparent;border:none;box-shadow:0 8px 40px rgba(0,0,0,0.9);padding:0;border-radius:14px;}
      .gcc-popup .leaflet-popup-content{margin:0;border-radius:14px;overflow:visible;}
      .gcc-popup .leaflet-popup-tip-container{display:none;}
      .leaflet-container{background:#04080f;font-family:'Inter',system-ui,sans-serif;}
      .leaflet-popup{z-index:9999!important;}
      .leaflet-pane.leaflet-popup-pane{z-index:9999!important;}
    `;
    document.head.appendChild(style);

    gcc.forEach(c=>{
      const pulse=c.status==="HALTED"||c.status==="DISRUPTED"||c.status==="CRITICAL";
      const icon=L.divIcon({
        className:'',
        html:`<div style="position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
          ${pulse?`<div style="position:absolute;inset:0;border-radius:50%;border:2px solid ${c.col};animation:ping 1.5s ease-out infinite;opacity:0.7;"></div>`:''}
          <div style="width:16px;height:16px;border-radius:50%;background:${c.col};border:2px solid ${c.col}bb;box-shadow:0 0 14px ${c.col},0 0 5px ${c.col};z-index:2;position:relative;"></div>
        </div>
        <style>@keyframes ping{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.6);opacity:0}}</style>`,
        iconSize:[40,40],iconAnchor:[20,20],
      });

      const html=`
        <div style="background:#060f1c;border:1.5px solid ${c.col}99;border-radius:14px;padding:18px;min-width:270px;max-width:310px;font-family:'Inter',system-ui,sans-serif;color:#e0e8f0;box-shadow:0 8px 40px rgba(0,0,0,0.95);">
          <div style="display:flex;align-items:center;gap:9px;margin-bottom:11px;">
            <span style="font-size:24px;">${c.emoji}</span>
            <div>
              <div style="font-weight:800;font-size:15px;color:#eef4ff;">${c.name}</div>
              <div style="font-size:10px;letter-spacing:2px;font-weight:700;color:${c.col};margin-top:1px;">${c.status}</div>
            </div>
          </div>
          <div style="background:${c.col}18;border:1px solid ${c.col}55;border-radius:9px;padding:9px 12px;margin-bottom:11px;">
            <div style="font-size:11px;font-weight:700;color:${c.col};margin-bottom:4px;">⚠️ ${c.headline}</div>
            <div style="font-size:10px;color:#8898a8;line-height:1.65;">${c.detail}</div>
          </div>
          <div style="font-size:10px;color:#6070a0;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid rgba(255,255,255,0.08);">📊 ${c.exports}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
            ${c.keyFacts.map(f=>`<div style="font-size:9px;color:#8090a0;background:rgba(255,255,255,0.04);border-radius:6px;padding:5px 8px;line-height:1.4;">• ${f}</div>`).join('')}
          </div>
        </div>`;

      L.marker([c.lat,c.lng],{icon})
       .bindPopup(L.popup({maxWidth:320,className:'gcc-popup',closeButton:true,offset:[0,-10]}).setContent(html))
       .addTo(map);
    });

    mapInstance.current=map;
  },[ready]);

  return(
    <div style={{margin:"14px 0",background:"rgba(4,12,22,0.97)",border:"1px solid rgba(255,100,0,0.22)",borderRadius:18,padding:"16px 18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"monospace",fontSize:12,color:"#ff8800",letterSpacing:2}}>⚡ GCC + EGYPT — LIVE SUPPLY STATUS · Click markers for full detail</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          {[{col:"#ff2222",l:"HALTED"},{col:"#ff7700",l:"DISRUPTED"},{col:"#ffaa00",l:"REDUCED"},{col:"#ff4400",l:"CRITICAL"}].map((x,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:x.col}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:x.col,boxShadow:`0 0 5px ${x.col}`}}/>{x.l}
            </div>
          ))}
        </div>
      </div>
      <div ref={mapRef} style={{height:380,borderRadius:12,overflow:"hidden",border:"1px solid rgba(0,100,160,0.2)"}}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginTop:12}}>
        {gcc.map((c,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,0.4)",borderRadius:9,padding:"9px 10px",borderLeft:`3px solid ${c.col}`}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
              <span style={{fontSize:13}}>{c.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,color:"#c0d0e0"}}>{c.name}</span>
              <span style={{marginLeft:"auto",fontSize:8,color:c.col,fontWeight:700,fontFamily:"monospace"}}>{c.status}</span>
            </div>
            <div style={{fontSize:9,color:"#ff9966",lineHeight:1.4}}>{c.headline}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TankGauge({level}){
  const fill=level>=50?"#22cc55":level>=35?"#ffcc00":level>=20?"#ff8800":"#ff3333";
  return(
    <div style={{position:"relative",height:13,background:"rgba(0,0,0,0.55)",borderRadius:7,border:"1px solid rgba(255,255,255,0.09)",overflow:"hidden",margin:"6px 0"}}>
      <div style={{width:`${level}%`,height:"100%",background:`linear-gradient(90deg,${fill}77,${fill})`,borderRadius:7}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(255,255,255,0.18),transparent)",borderRadius:7}}/>
      </div>
      {[25,50,75].map(t=><div key={t} style={{position:"absolute",left:`${t}%`,top:0,bottom:0,width:1,background:"rgba(255,255,255,0.1)"}}/>)}
    </div>
  );
}

function Blink({col}){
  const [on,setOn]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setOn(v=>!v),750);return()=>clearInterval(t);},[]);
  return <div style={{width:9,height:9,borderRadius:"50%",background:on?col:"transparent",border:`2px solid ${col}`,boxShadow:on?`0 0 7px ${col}`:"none",transition:"all 0.3s",flexShrink:0}}/>;
}

function Card({c,index}){
  const [h,setH]=useState(false);
  const tc=c.level>=50?"#44cc77":c.level>=35?"#ffcc00":c.level>=20?"#ff8800":"#ff4444";
  const gccNames={qatar:"🇶🇦 Qatar",uae:"🇦🇪 UAE",ksa:"🇸🇦 Saudi",kuwait:"🇰🇼 Kuwait",bahrain:"🇧🇭 Bahrain",egypt:"🇪🇬 Egypt"};
  // Alternate dropdown direction: last 3 cards in each row open to the left
  const openLeft=index%6>=3;
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:h?"rgba(12,28,44,0.99)":"rgba(5,15,28,0.95)",border:`1px solid ${c.col}44`,borderTop:`2px solid ${c.col}`,borderRadius:12,padding:"12px 13px",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",cursor:"default",minWidth:0,position:"relative",zIndex:h?1000:1}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:20}}>{c.flag}</span>
          <span style={{fontWeight:700,fontSize:13,color:"#d0e8f0"}}>{c.name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <Blink col={c.col}/>
          <span style={{fontSize:9,fontWeight:700,color:c.col,letterSpacing:1}}>{c.sev}</span>
        </div>
      </div>
      <TankGauge level={c.level}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        <span style={{fontSize:9,color:"#304050",fontFamily:"monospace"}}>E</span>
        <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:tc}}>{c.level}%</span>
        <span style={{fontSize:9,color:"#304050",fontFamily:"monospace"}}>F</span>
      </div>
      {h&&(
        <div style={{
          position:"fixed",
          // We'll use JS positioning via a portal trick — for now use absolute with high z-index
          zIndex:99999,
          background:"rgba(6,14,26,0.99)",
          border:`1.5px solid ${c.col}88`,
          borderRadius:14,
          padding:"14px 16px",
          width:280,
          boxShadow:`0 16px 48px rgba(0,0,0,0.95), 0 0 0 1px ${c.col}22`,
          animation:"fadeIn 0.18s ease",
          // Position below card, respecting screen edges
          left: openLeft?"auto":"0",
          right: openLeft?"0":"auto",
          top:"calc(100% + 6px)",
        }}>
          <div style={{fontSize:10,color:"#ff8800",fontWeight:700,marginBottom:8,letterSpacing:1,textTransform:"uppercase",borderBottom:"1px solid rgba(255,255,255,0.08)",paddingBottom:6}}>
            {c.flag} {c.name} — GCC Import Breakdown
          </div>
          {Object.entries(c.imports).map(([k,v])=>(
            <div key={k} style={{fontSize:10,color:"#708090",marginBottom:5,display:"flex",gap:6,alignItems:"flex-start"}}>
              <span style={{color:"#ffaa66",fontWeight:700,minWidth:70,fontSize:9,flexShrink:0,paddingTop:1}}>{gccNames[k]}</span>
              <span style={{color:"#9098b0",lineHeight:1.45}}>{v}</span>
            </div>
          ))}
          <div style={{marginTop:9,paddingTop:9,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{fontSize:10,color:"#5a6878",marginBottom:3}}>🏭 <span style={{color:"#a8b4c4"}}>{c.industry}</span></div>
            <div style={{fontSize:10,color:"#5a6878"}}>💸 Est. 90d loss: <span style={{color:"#ff7744",fontFamily:"monospace",fontWeight:700}}>{c.loss}</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectionSection(){
  const [active,setActive]=useState(0);
  const p=weekProjections[active];
  const impCol={"High":"#ff6600","Medium":"#ffcc00","Low-Med":"#aacc00","Critical":"#ff2222","Catastrophic":"#cc0000","Structural shift":"#cc44ff","Long-term":"#4488ff","Recovery 6–18mo":"#44cc77","Permanent":"#ff44aa","Transformative":"#00ccff"};
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:`1px solid ${p.col}44`,borderRadius:18,padding:"18px 20px",marginBottom:14,transition:"border-color 0.3s"}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#ffaa00",letterSpacing:2,marginBottom:14}}>📅 DURATION SCENARIOS — What happens if the crisis continues?</div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {weekProjections.map((pr,i)=>(
          <button key={i} onClick={()=>setActive(i)} style={{padding:"8px 14px",borderRadius:10,border:`1px solid ${pr.col}${active===i?"cc":"44"}`,background:active===i?`${pr.col}22`:"rgba(0,0,0,0.3)",color:active===i?pr.col:"#607080",fontFamily:"monospace",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s",letterSpacing:1}}>
            {pr.icon} {pr.week}
          </button>
        ))}
      </div>
      <div style={{animation:"fadeIn 0.2s ease"}}>
        <div style={{fontSize:20,fontWeight:900,fontFamily:"monospace",color:p.col,marginBottom:10}}>{p.icon} {p.week} — {p.label}</div>
        <div style={{background:`${p.col}11`,border:`1px solid ${p.col}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#c0c8d8",lineHeight:1.6}}>{p.overview}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[{l:"GDP Impact",v:p.gdp,c:"#ff5555"},{l:"Trade Loss",v:p.trade,c:"#ff8800"},{l:"Energy Prices",v:p.energy,c:"#ffcc00"},{l:"Food Prices",v:p.food,c:"#ff9966"}].map((s,i)=>(
            <div key={i} style={{textAlign:"center",background:"rgba(0,0,0,0.35)",padding:"10px",borderRadius:8,border:`1px solid ${s.c}33`}}>
              <div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:s.c}}>{s.v}</div>
              <div style={{fontSize:9,color:"#506070",letterSpacing:1,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={{fontSize:10,color:"#607080",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Regional Impact</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {p.regions.map((sc,i)=>(
                <div key={i} style={{background:"rgba(0,0,0,0.35)",borderRadius:9,padding:"10px 12px",borderLeft:`3px solid ${p.col}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:p.col,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{sc.r}</div>
                  <div style={{fontSize:10,color:"#8898a8",lineHeight:1.6}}>{sc.txt}</div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,color:"#607080",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Industry Impact This Week</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {p.industries.map((ind,i)=>{
                const ic=impCol[ind.imp]||"#ff8800";
                return(
                  <div key={i} style={{background:"rgba(0,0,0,0.35)",borderRadius:9,padding:"10px 12px",borderLeft:`3px solid ${ic}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#c0d0e0"}}>{ind.n}</div>
                      <span style={{fontSize:9,fontWeight:700,background:`${ic}22`,color:ic,padding:"2px 8px",borderRadius:8,border:`1px solid ${ic}44`}}>{ind.imp}</span>
                    </div>
                    <div style={{fontSize:10,color:"#8898a8",lineHeight:1.6}}>{ind.txt}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function IndustrySection(){
  const [expanded,setExpanded]=useState(null);
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:"1px solid rgba(0,150,200,0.18)",borderRadius:18,padding:"18px 20px",marginBottom:14}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#44aaff",letterSpacing:2,marginBottom:6}}>🏭 INDUSTRIES AT RISK — Click any card for week-by-week projection</div>
      <div style={{fontSize:10,color:"#405060",marginBottom:14}}>Impact severity shown as % disruption risk. Click to expand full timeline.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
        {industries.map((ind,i)=>(
          <div key={i} onClick={()=>setExpanded(expanded===i?null:i)}
            style={{background:expanded===i?"rgba(10,25,40,0.99)":"rgba(0,0,0,0.35)",borderRadius:10,padding:"12px 14px",border:`1px solid ${expanded===i?ind.col+"88":"rgba(255,255,255,0.05)"}`,cursor:"pointer",transition:"all 0.2s"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:18}}>{ind.icon}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#c0d0e0"}}>{ind.name}</span>
              </div>
              <span style={{fontFamily:"monospace",fontSize:13,fontWeight:800,color:ind.col}}>{ind.impact}%</span>
            </div>
            <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginBottom:7}}>
              <div style={{width:`${ind.impact}%`,height:"100%",background:`linear-gradient(90deg,${ind.col}88,${ind.col})`,borderRadius:3}}/>
            </div>
            <div style={{fontSize:9,color:"#ff8855",marginBottom:expanded===i?8:0}}>📍 {ind.affected}</div>
            {expanded===i&&(
              <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.07)",animation:"fadeIn 0.2s ease"}}>
                <div style={{fontSize:10,color:ind.col,fontWeight:700,marginBottom:7,letterSpacing:1}}>WEEK-BY-WEEK PROJECTION</div>
                {ind.byWeek.map((w,j)=>(
                  <div key={j} style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}>
                    <span style={{fontSize:9,fontFamily:"monospace",color:ind.col,fontWeight:700,flexShrink:0,background:`${ind.col}22`,padding:"2px 6px",borderRadius:4,minWidth:28,textAlign:"center"}}>{j+1===5?"5+":j+1}</span>
                    <span style={{fontSize:10,color:"#8090a0",lineHeight:1.55}}>{w}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function Divider({label,col}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0 10px"}}>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
      <span style={{fontSize:10,color:"#405060",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
    </div>
  );
}

function App(){
  return(
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"rgba(255,30,30,0.1)",borderBottom:"1px solid rgba(255,30,30,0.25)",padding:"9px 0",overflow:"hidden",position:"sticky",top:0,zIndex:200,backdropFilter:"blur(4px)"}}>
        <div style={{display:"flex",whiteSpace:"nowrap",animation:"scroll 38s linear infinite"}}>
          {["🔴 BREAKING — Qatar halts ALL LNG shipments · No restart timeline","⚠️ UAE: ADNOC 500k bbl/day offline · Jebel Ali congested","🔴 Saudi Aramco Ras Tanura partial shutdown · 30% export cut","⚠️ Kuwait KPC partial force majeure · Al-Ahmadi port 30% capacity","🔴 Bahrain BAPCO cuts 25% · ALBA smelter reduced power","🚨 Egypt: Suez Canal throughput down 65% · Cairo reports LNG shortage","⚠️ Japan activates 90-day strategic reserves","🔴 S.Korea LNG spot +34% in 48hrs","⚠️ Pakistan: 4,200MW at risk","🔴 Bangladesh: UN humanitarian concern","⚠️ India GAIL force majeure on Qatar contracts",
            "🔴 BREAKING — Qatar halts ALL LNG shipments","⚠️ UAE ADNOC offline","🔴 Saudi 30% cut","⚠️ Kuwait force majeure","🚨 Suez Canal 65% down"
          ].map((t,i)=><span key={i} style={{display:"inline-block",padding:"0 44px",fontSize:11,color:"#ff8855",fontFamily:"monospace",letterSpacing:1}}>{t}</span>)}
        </div>
      </div>

      <div style={{maxWidth:1320,margin:"0 auto",padding:"18px 16px"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:8,background:"rgba(255,40,40,0.12)",border:"1px solid rgba(255,40,40,0.35)",borderRadius:20,padding:"5px 18px",fontSize:10,color:"#ff6060",letterSpacing:2,marginBottom:13,textTransform:"uppercase"}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#ff3333",animation:"pulse 1.2s ease-in-out infinite"}}/>
            LIVE CRISIS MONITOR · MARCH 2026
          </div>
          <div style={{fontSize:"clamp(22px,4vw,40px)",fontWeight:900,fontFamily:"monospace",background:"linear-gradient(135deg,#ff5555,#ffaa00)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1.2,marginBottom:9}}>GCC ENERGY CRISIS<br/>GLOBAL IMPACT TRACKER</div>
          <p style={{color:"#506070",fontSize:12,maxWidth:640,margin:"0 auto"}}>Hover country cards for full import breakdown · Click map markers for country detail · Click industries for week-by-week projections</p>
        </div>

        <Divider label="Affected Nations — Hover Cards for Full GCC Import Breakdown" col="#ff4444"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:4}}>
          {countries.slice(0,6).map((c,i)=><Card key={i} c={c} index={i}/>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:4}}>
          {countries.slice(6,12).map((c,i)=><Card key={i} c={c} index={i}/>)}
        </div>

        <RealMap/>

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {[
            {col:"#ff4444",label:"Qatar LNG Halted",val:"77M t/yr",sub:"≈25% of global LNG supply"},
            {col:"#ff8800",label:"GCC Oil Disrupted",val:"3.2M bbl/d",sub:"Qatar+UAE+KSA+Kuwait offline"},
            {col:"#ff5500",label:"Suez Canal Drop",val:"−65%",sub:"Egypt — Cairo crisis declared"},
            {col:"#44aaff",label:"Economic Risk 90d",val:"$420B",sub:"Est. global GDP impact"},
          ].map((s,i)=>(
            <div key={i} style={{background:"rgba(5,14,26,0.95)",border:`1px solid ${s.col}33`,borderTop:`2px solid ${s.col}`,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:9,color:"#506070",letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>{s.label}</div>
              <div style={{fontFamily:"monospace",fontSize:20,fontWeight:800,color:s.col}}>{s.val}</div>
              <div style={{fontSize:10,color:"#405060",marginTop:3}}>{s.sub}</div>
            </div>
          ))}
        </div>

        <Divider label="Duration Scenarios — Week by Week Projections" col="#ffaa00"/>
        <ProjectionSection/>

        <Divider label="Industries at Risk — Click for Week-by-Week Timeline" col="#44aaff"/>
        <IndustrySection/>

        <div style={{textAlign:"center",padding:"14px 0 8px",fontSize:10,color:"#2a3a4a",lineHeight:1.8}}>
          Data: IEA · GIIGNL · BP Statistical Review · IMF · World Bank · All projections are model-based estimates · March 2026
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
