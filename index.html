// Leaflet-based real map component
function RealMap(){
  const mapRef=useRef(null);
  const mapInstance=useRef(null);
  const [ready,setReady]=useState(false);

  useEffect(()=>{
    // Load leaflet CSS
    if(!document.getElementById('leaflet-css')){
      const link=document.createElement('link');
      link.id='leaflet-css';
      link.rel='stylesheet';
      link.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
      document.head.appendChild(link);
    }
    // Load leaflet JS
    if(!window.L){
      const script=document.createElement('script');
      script.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
      script.onload=()=>setReady(true);
      document.head.appendChild(script);
    } else {
      setReady(true);
    }
  },[]);

  useEffect(()=>{
    if(!ready||!mapRef.current||mapInstance.current)return;
    const L=window.L;

    const map=L.map(mapRef.current,{
      center:[26,48],zoom:5,
      zoomControl:true,
      scrollWheelZoom:true,
      attributionControl:false,
    });

    // Dark tile layer
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      maxZoom:18,attribution:''
    }).addTo(map);

    // Custom icon factory
    const makeIcon=(col,pulse)=>L.divIcon({
      className:'',
      html:`<div style="position:relative;width:36px;height:36px;display:flex;align-items:center;justify-content:center;">
        ${pulse?`<div style="position:absolute;inset:0;border-radius:50%;border:2px solid ${col};animation:ping 1.4s ease-out infinite;"></div>`:''}
        <div style="width:16px;height:16px;border-radius:50%;background:${col};border:2px solid ${col}cc;box-shadow:0 0 12px ${col},0 0 4px ${col};"></div>
      </div>
      <style>@keyframes ping{0%{transform:scale(1);opacity:0.8}100%{transform:scale(2.5);opacity:0}}</style>`,
      iconSize:[36,36],iconAnchor:[18,18],
    });

    const statusColor={HALTED:"#ff2222",DISRUPTED:"#ff7700",REDUCED:"#ffaa00",CRITICAL:"#ff4400"};

    gcc.forEach(c=>{
      const coords={
        QA:[25.28,51.53],AE:[24.45,54.37],SA:[24.68,46.72],
        KW:[29.37,47.98],BH:[26.07,50.55],EG:[26.82,30.80]
      };
      const col=c.col;
      const marker=L.marker(coords[c.id],{icon:makeIcon(col,c.status==="HALTED"||c.status==="DISRUPTED"||c.status==="CRITICAL")});

      const popupHtml=`
        <div style="background:#060f1c;border:1px solid ${col}99;border-radius:12px;padding:16px;min-width:260px;max-width:300px;font-family:'Inter',system-ui,sans-serif;color:#e0e8f0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <span style="font-size:22px;">${c.emoji}</span>
            <div>
              <div style="font-weight:800;font-size:15px;color:#e8f0f8;">${c.name}</div>
              <div style="font-size:10px;letter-spacing:2px;font-weight:700;color:${col};margin-top:1px;">${c.status}</div>
            </div>
          </div>
          <div style="background:${col}18;border:1px solid ${col}44;border-radius:8px;padding:8px 10px;margin-bottom:10px;">
            <div style="font-size:11px;font-weight:700;color:${col};margin-bottom:3px;">⚠️ ${c.headline}</div>
            <div style="font-size:10px;color:#8898a8;line-height:1.6;">${c.detail}</div>
          </div>
          <div style="font-size:10px;color:#6878a0;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07);">
            📊 ${c.exports}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
            ${c.keyFacts.map(f=>`<div style="font-size:9px;color:#8090a0;background:rgba(255,255,255,0.04);border-radius:5px;padding:4px 7px;">• ${f}</div>`).join('')}
          </div>
        </div>`;

      marker.bindPopup(L.popup({
        maxWidth:320,minWidth:280,
        className:'dark-popup',
        closeButton:true,
        offset:[0,-8],
      }).setContent(popupHtml));

      marker.addTo(map);
    });

    // Popup dark styling
    const style=document.createElement('style');
    style.textContent=`
      .dark-popup .leaflet-popup-content-wrapper{background:transparent;border:none;box-shadow:0 8px 32px rgba(0,0,0,0.8);padding:0;border-radius:12px;}
      .dark-popup .leaflet-popup-content{margin:0;border-radius:12px;overflow:hidden;}
      .dark-popup .leaflet-popup-tip-container{display:none;}
      .leaflet-container{background:#04080f;}
    `;
    document.head.appendChild(style);

    mapInstance.current=map;
  },[ready]);

  return(
    <div style={{margin:"14px 0",background:"rgba(4,12,22,0.97)",border:"1px solid rgba(255,100,0,0.22)",borderRadius:18,padding:"16px 18px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontFamily:"monospace",fontSize:12,color:"#ff8800",letterSpacing:2}}>⚡ GCC SOURCE NATIONS — LIVE SUPPLY STATUS · Hover markers for full detail</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"center"}}>
          {[{col:"#ff2222",l:"HALTED"},{col:"#ff7700",l:"DISRUPTED"},{col:"#ffaa00",l:"REDUCED"},{col:"#ff4400",l:"CRITICAL"}].map((x,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:x.col}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:x.col,boxShadow:`0 0 5px ${x.col}`}}/>{x.l}
            </div>
          ))}
        </div>
      </div>
      <div ref={mapRef} style={{height:360,borderRadius:12,overflow:"hidden",border:"1px solid rgba(0,100,160,0.2)"}}/>
      {/* Status strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginTop:12}}>
        {gcc.map((c,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,0.4)",borderRadius:9,padding:"9px 10px",borderLeft:`3px solid ${c.col}`}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
              <span style={{fontSize:13}}>{c.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,color:"#c0d0e0"}}>{c.name}</span>
              <span style={{marginLeft:"auto",fontSize:8,color:c.col,fontWeight:700,fontFamily:"monospace"}}>{c.status}</span>
            </div>
            <div style={{fontSize:9,color:"#ff9966",lineHeight:1.4}}>{c.headline}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TankGauge({level}){
  const fill=level>=50?"#22cc55":level>=35?"#ffcc00":level>=20?"#ff8800":"#ff3333";
  return(
    <div style={{position:"relative",height:13,background:"rgba(0,0,0,0.55)",borderRadius:7,border:"1px solid rgba(255,255,255,0.09)",overflow:"hidden",margin:"6px 0"}}>
      <div style={{width:`${level}%`,height:"100%",background:`linear-gradient(90deg,${fill}77,${fill})`,borderRadius:7}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(255,255,255,0.18),transparent)",borderRadius:7}}/>
      </div>
      {[25,50,75].map(t=><div key={t} style={{position:"absolute",left:`${t}%`,top:0,bottom:0,width:1,background:"rgba(255,255,255,0.1)"}}/>)}
    </div>
  );
}

function Blink({col}){
  const [on,setOn]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setOn(v=>!v),750);return()=>clearInterval(t);},[]);
  return <div style={{width:9,height:9,borderRadius:"50%",background:on?col:"transparent",border:`2px solid ${col}`,boxShadow:on?`0 0 7px ${col}`:"none",transition:"all 0.3s",flexShrink:0}}/>;
}

function Card({c}){
  const [h,setH]=useState(false);
  const tc=c.level>=50?"#44cc77":c.level>=35?"#ffcc00":c.level>=20?"#ff8800":"#ff4444";
  const gccNames={qatar:"🇶🇦 Qatar",uae:"🇦🇪 UAE",ksa:"🇸🇦 Saudi",kuwait:"🇰🇼 Kuwait",bahrain:"🇧🇭 Bahrain",egypt:"🇪🇬 Egypt"};
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:h?"rgba(12,28,44,0.99)":"rgba(5,15,28,0.95)",border:`1px solid ${c.col}44`,borderTop:`2px solid ${c.col}`,borderRadius:12,padding:"12px 13px",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",boxShadow:h?`0 8px 24px ${c.col}22`:"none",cursor:"default",minWidth:0,position:"relative",zIndex:h?10:1}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:20}}>{c.flag}</span>
          <span style={{fontWeight:700,fontSize:13,color:"#d0e8f0"}}>{c.name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <Blink col={c.col}/>
          <span style={{fontSize:9,fontWeight:700,color:c.col,letterSpacing:1}}>{c.sev}</span>
        </div>
      </div>
      <TankGauge level={c.level}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        <span style={{fontSize:9,color:"#304050",fontFamily:"monospace"}}>E</span>
        <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:tc}}>{c.level}%</span>
        <span style={{fontSize:9,color:"#304050",fontFamily:"monospace"}}>F</span>
      </div>
      {h&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"rgba(8,20,36,0.99)",border:`1px solid ${c.col}66`,borderRadius:12,padding:"12px 13px",zIndex:50,animation:"fadeIn 0.18s ease",boxShadow:`0 12px 32px rgba(0,0,0,0.8)`}}>
          <div style={{fontSize:10,color:"#506070",fontWeight:700,marginBottom:7,letterSpacing:1,textTransform:"uppercase"}}>GCC Import Breakdown</div>
          {Object.entries(c.imports).map(([k,v])=>(
            <div key={k} style={{fontSize:10,color:"#708090",marginBottom:4,display:"flex",gap:6,alignItems:"flex-start"}}>
              <span style={{color:"#ff9966",fontWeight:700,minWidth:68,fontSize:9,flexShrink:0}}>{gccNames[k]}</span>
              <span style={{color:"#9098b0",lineHeight:1.4}}>{v}</span>
            </div>
          ))}
          <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{fontSize:10,color:"#606880",marginBottom:3}}>🏭 <span style={{color:"#b0b8c8"}}>{c.industry}</span></div>
            <div style={{fontSize:10,color:"#606880"}}>💸 Est. 90d loss: <span style={{color:"#ff7744",fontFamily:"monospace",fontWeight:700}}>{c.loss}</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectionSection(){
  const [active,setActive]=useState(0);
  const p=weekProjections[active];
  const impCol={High:"#ff6600","Medium":"#ffcc00","Low-Med":"#aacc00","Critical":"#ff2222","Catastrophic":"#cc0000","Structural shift":"#cc44ff","Long-term":"#4488ff","Recovery 6–18mo":"#44cc77","Permanent":"#ff44aa","Transformative":"#00ccff"};
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:`1px solid ${p.col}44`,borderRadius:18,padding:"18px 20px",marginBottom:14,transition:"border-color 0.3s"}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#ffaa00",letterSpacing:2,marginBottom:14}}>📅 DURATION SCENARIOS — What happens if the crisis continues?</div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {weekProjections.map((pr,i)=>(
          <button key={i} onClick={()=>setActive(i)} style={{padding:"8px 14px",borderRadius:10,border:`1px solid ${pr.col}${active===i?"cc":"44"}`,background:active===i?`${pr.col}22`:"rgba(0,0,0,0.3)",color:active===i?pr.col:"#607080",fontFamily:"monospace",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s",letterSpacing:1}}>
            {pr.icon} {pr.week}
          </button>
        ))}
      </div>
      <div style={{animation:"fadeIn 0.2s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>
          <div style={{fontSize:20,fontWeight:900,fontFamily:"monospace",color:p.col}}>{p.icon} {p.week} — {p.label}</div>
        </div>
        <div style={{background:`${p.col}11`,border:`1px solid ${p.col}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#c0c8d8",lineHeight:1.6}}>
          {p.overview}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
          {[{l:"GDP Impact",v:p.gdp,c:"#ff5555"},{l:"Trade Loss",v:p.trade,c:"#ff8800"},{l:"Energy Prices",v:p.energy,c:"#ffcc00"},{l:"Food Prices",v:p.food,c:"#ff9966"}].map((s,i)=>(
            <div key={i} style={{textAlign:"center",background:"rgba(0,0,0,0.35)",padding:"10px",borderRadius:8,border:`1px solid ${s.c}33`}}>
              <div style={{fontSize:18,fontWeight:800,fontFamily:"monospace",color:s.c}}>{s.v}</div>
              <div style={{fontSize:9,color:"#506070",letterSpacing:1,marginTop:2}}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <div style={{fontSize:10,color:"#607080",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Regional Impact</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {p.regions.map((sc,i)=>(
                <div key={i} style={{background:"rgba(0,0,0,0.35)",borderRadius:9,padding:"10px 12px",borderLeft:`3px solid ${p.col}`}}>
                  <div style={{fontSize:10,fontWeight:700,color:p.col,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{sc.r}</div>
                  <div style={{fontSize:10,color:"#8898a8",lineHeight:1.6}}>{sc.txt}</div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div style={{fontSize:10,color:"#607080",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Industry Impact This Week</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {p.industries.map((ind,i)=>{
                const ic=impCol[ind.imp]||"#ff8800";
                return(
                  <div key={i} style={{background:"rgba(0,0,0,0.35)",borderRadius:9,padding:"10px 12px",borderLeft:`3px solid ${ic}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#c0d0e0"}}>{ind.n}</div>
                      <span style={{fontSize:9,fontWeight:700,background:`${ic}22`,color:ic,padding:"2px 8px",borderRadius:8,border:`1px solid ${ic}44`}}>{ind.imp}</span>
                    </div>
                    <div style={{fontSize:10,color:"#8898a8",lineHeight:1.6}}>{ind.txt}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

function IndustrySection(){
  const industries=[

     byWeek:["W1: Ammonia prices up 25%, no shutdowns yet","W2: Plants shutting down across South Asia","W3: UN WFP emergency — 14 nations","W4: Food price index at 2008 crisis levels","W5+: Green ammonia investment surge, food system restructured"]},
    {name:"Semiconductors",    icon:"💻",impact:78,col:"#ff5555",affected:"Taiwan, South Korea, Japan",
     byWeek:["W1: Contingency power activated at TSMC & Samsung","W2: Non-critical fab operations reduced 10%","W3: Output down 15% — chip shortage Wave 2 begins","W4: Global shortage across auto, defense, consumer tech","W5+: Emergency fab expansions, 12–18mo to recovery"]},

     byWeek:["W1: Feedstock anxiety, prices up 20%","W2: Naphtha crackers reducing output","W3: Plastic & pharma ingredient shortages","W4: Major chemical plants offline","W5+: Bio-based feedstock alternatives fast-tracked"]},
    {name:"Steel & Metals",    icon:"🔩",impact:70,col:"#ff7700",affected:"Japan, Korea, India, EU",

    {name:"Shipping & Ports",  icon:"⚓",impact:80,col:"#ff4422",affected:"Egypt (Suez), Singapore, UAE",

    {name:"Aviation & Fuel",   icon:"✈️",impact:55,col:"#ffaa00",affected:"Global — all airlines",
     byWeek:["W1: Fuel surcharges announced","W2: Long-haul routes repriced","W3: 20+ routes suspended","W4: 50+ route suspensions, $120B revenue loss","W5+: Aviation restructuring, SAF investment surges"]},
    {name:"Water/Desalination", icon:"💧",impact:80,col:"#ff3300",affected:"Saudi, UAE, Kuwait, Qatar, Bahrain",

     byWeek:["W1: API feedstock concerns raised","W2: Indian pharma on gas rationing","W3: 80+ generic medicine shortages","W4: Hospital supply chains critically stressed","W5+: API manufacturing diversification accelerated"]},
    {name:"Finance & Banking", icon:"🏦",impact:45,col:"#ffcc00",affected:"Global — market volatility",
     byWeek:["W1: Energy stocks +25%, markets volatile","W2: EM currencies under pressure","W3: Central banks emergency liquidity","W4: 3 sovereign debt downgrades, IMF intervention","W5+: New financial order, energy as collateral"]},
  ];

  const [expanded,setExpanded]=useState(null);
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:"1px solid rgba(0,150,200,0.18)",borderRadius:18,padding:"18px 20px",marginBottom:14}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#44aaff",letterSpacing:2,marginBottom:6}}>🏭 INDUSTRIES AT RISK — Click any industry for week-by-week projection</div>
      <div style={{fontSize:10,color:"#405060",marginBottom:14}}>Impact severity shown as % disruption risk. Click to expand timeline.</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
        {industries.map((ind,i)=>(
          <div key={i} onClick={()=>setExpanded(expanded===i?null:i)}
            style={{background:expanded===i?"rgba(10,25,40,0.99)":"rgba(0,0,0,0.35)",borderRadius:10,padding:"12px 14px",border:`1px solid ${expanded===i?ind.col+"88":"rgba(255,255,255,0.05)"}`,cursor:"pointer",transition:"all 0.2s"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:18}}>{ind.icon}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#c0d0e0"}}>{ind.name}</span>
              </div>
              <span style={{fontFamily:"monospace",fontSize:13,fontWeight:800,color:ind.col}}>{ind.impact}%</span>
            </div>
            <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginBottom:7}}>
              <div style={{width:`${ind.impact}%`,height:"100%",background:`linear-gradient(90deg,${ind.col}88,${ind.col})`,borderRadius:3}}/>
            </div>
            <div style={{fontSize:9,color:"#ff8855",marginBottom:expanded===i?8:0}}>📍 {ind.affected}</div>

              <div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.07)",animation:"fadeIn 0.2s ease"}}>
                <div style={{fontSize:10,color:ind.col,fontWeight:700,marginBottom:6,letterSpacing:1}}>WEEK-BY-WEEK PROJECTION</div>
                {ind.byWeek.map((w,j)=>(
                  <div key={j} style={{display:"flex",gap:8,marginBottom:5,alignItems:"flex-start"}}>

}

function Divider({label,col}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0 10px"}}>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
      <span style={{fontSize:10,color:"#405060",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
    </div>
  );
}
