function Dot({col,size=7,anim=true}){

useEffect(()=>{if(!anim)return;const t=setInterval(()=>setOn(v=>!v),600+Math.random()*400);return()=>clearInterval(t);},[anim]);
return <div style={{width:size,height:size,borderRadius:'50%',flexShrink:0,background:on?col:'rgba(0,0,0,0)',border:`1.5px solid ${col}`,transition:'all .3s'}}/>;
}

function Bar({val,col,h=5,max=100}){

return(
