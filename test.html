function TankGauge({level}){
  const fill=level>=50?"#22cc55":level>=35?"#ffcc00":level>=20?"#ff8800":"#ff3333";
  return(
    <div style={{position:"relative",height:13,background:"rgba(0,0,0,0.55)",borderRadius:7,border:"1px solid rgba(255,255,255,0.09)",overflow:"hidden",margin:"6px 0"}}>
      <div style={{width:`${level}%`,height:"100%",background:`linear-gradient(90deg,${fill}77,${fill})`,borderRadius:7}}>
        <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(255,255,255,0.18),transparent)",borderRadius:7}}/>
      </div>
      {[25,50,75].map(t=><div key={t} style={{position:"absolute",left:`${t}%`,top:0,bottom:0,width:1,background:"rgba(255,255,255,0.1)"}}/>)}
    </div>
  );
}

function Blink({col}){
  const [on,setOn]=useState(true);
  useEffect(()=>{const t=setInterval(()=>setOn(v=>!v),750);return()=>clearInterval(t);},[]);
  return <div style={{width:9,height:9,borderRadius:"50%",background:on?col:"transparent",border:`2px solid ${col}`,boxShadow:on?`0 0 7px ${col}`:"none",transition:"all 0.3s",flexShrink:0}}/>;
}

function Card({c}){
  const [h,setH]=useState(false);
  const tc=c.level>=50?"#44cc77":c.level>=35?"#ffcc00":c.level>=20?"#ff8800":"#ff4444";
  return(
    <div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{background:h?"rgba(12,28,44,0.99)":"rgba(5,15,28,0.95)",border:`1px solid ${c.col}44`,borderTop:`2px solid ${c.col}`,borderRadius:12,padding:"12px 13px",transition:"all 0.2s",transform:h?"translateY(-2px)":"none",boxShadow:h?`0 8px 24px ${c.col}22`:"none",cursor:"default",minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:20}}>{c.flag}</span>
          <span style={{fontWeight:700,fontSize:13,color:"#d0e8f0"}}>{c.name}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <Blink col={c.col}/>
          <span style={{fontSize:9,fontWeight:700,color:c.col,letterSpacing:1}}>{c.sev}</span>
        </div>
      </div>
      <TankGauge level={c.level}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
        <span style={{fontSize:9,color:"#304050",fontFamily:"monospace"}}>E</span>
        <span style={{fontFamily:"monospace",fontSize:11,fontWeight:700,color:tc}}>{c.level}%</span>
        <span style={{fontSize:9,color:"#304050",fontFamily:"monospace"}}>F</span>
      </div>
      {h&&(
        <div style={{marginTop:9,paddingTop:9,borderTop:"1px solid rgba(255,255,255,0.07)",animation:"fadeIn 0.2s ease"}}>
          <div style={{fontSize:10,color:"#506070",fontWeight:700,marginBottom:5,letterSpacing:1,textTransform:"uppercase"}}>Imports from GCC</div>
          {Object.entries(c.imports).map(([k,v])=>(
            <div key={k} style={{fontSize:10,color:"#708090",marginBottom:3,display:"flex",gap:5}}>
              <span style={{color:"#ff8844",fontWeight:600,minWidth:50,textTransform:"uppercase",fontSize:9}}>{k}:</span>
              <span style={{color:"#9090a8"}}>{v}</span>
            </div>
          ))}
          <div style={{marginTop:6,paddingTop:6,borderTop:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{fontSize:10,color:"#606880",marginBottom:2}}>🏭 <span style={{color:"#b0b8c8"}}>{c.industry}</span></div>
            <div style={{fontSize:10,color:"#606880"}}>💸 Est. 90d loss: <span style={{color:"#ff7744",fontFamily:"monospace",fontWeight:700}}>{c.loss}</span></div>
          </div>
        </div>
      )}
    </div>
  );
}

          <text x="310" y="75"  fill="rgba(200,200,200,0.25)" fontSize="9" fontFamily="monospace" textAnchor="middle">IRAQ</text>
          <text x="480" y="72"  fill="rgba(200,200,200,0.25)" fontSize="9" fontFamily="monospace" textAnchor="middle">IRAN</text>

          {/* Strait of Hormuz */}
          <text x="518" y="152" fill="#ff6600" fontSize="8" fontFamily="monospace" textAnchor="middle">STRAIT OF HORMUZ ⚠️</text>

          {/* Blocked shipping routes */}
          <line x1="432" y1="165" x2="760" y2="20"  stroke="#ff222244" strokeWidth="1.5" strokeDasharray="8 5"/>
          <line x1="432" y1="165" x2="760" y2="70"  stroke="#ff222233" strokeWidth="1.5" strokeDasharray="8 5"/>
          <line x1="432" y1="165" x2="40"  y2="50"  stroke="#ff222233" strokeWidth="1.5" strokeDasharray="8 5"/>
          <text x="640" y="38"  fill="#ff4444" fontSize="9" fontWeight="bold" textAnchor="middle">🚫 BLOCKED</text>
          <text x="180" y="78"  fill="#ff4444" fontSize="9" fontWeight="bold" textAnchor="middle">🚫 BLOCKED</text>

          {/* GCC dots */}
          {dots.map((c,i)=>(
            <g key={i} onClick={e=>{e.stopPropagation();setSel(sel===i?null:i);}} style={{cursor:"pointer"}}>
              {c.pulse&&<circle cx={c.dx} cy={c.dy} r="14" fill="none" stroke={c.col} strokeWidth="1.5" opacity={blink?0.5:0.1}/>}
              <circle cx={c.dx} cy={c.dy} r="7" fill={blink&&c.pulse?c.col:`${c.col}88`} stroke={c.col} strokeWidth="2" style={{filter:`drop-shadow(0 0 ${blink?10:5}px ${c.col})`}}/>
              <text x={c.dx} y={c.dy+20} fill={c.col} fontSize="8" fontWeight="bold" fontFamily="monospace" textAnchor="middle">{c.name}</text>
              <text x={c.dx} y={c.dy+30} fill={c.col} fontSize="7" fontFamily="monospace" textAnchor="middle" opacity="0.8">{c.status}</text>
              {sel===i&&(
                <foreignObject x={Math.min(c.dx-110,570)} y={Math.max(c.dy-170,5)} width="220" height="160">
                  <div style={{background:"rgba(4,11,20,0.99)",border:`1px solid ${c.col}99`,borderRadius:10,padding:"11px 13px",boxShadow:`0 4px 20px ${c.col}55`}}>

                      <span style={{fontSize:16}}>{c.emoji}</span>
                      <span style={{fontWeight:700,color:c.col,fontSize:12,fontFamily:"monospace"}}>{c.name}</span>
                      <span style={{marginLeft:"auto",fontSize:8,fontWeight:700,background:`${c.col}22`,color:c.col,padding:"2px 7px",borderRadius:8,border:`1px solid ${c.col}44`}}>{c.status}</span>

                    <div style={{fontSize:10,color:"#ff9966",fontWeight:600,marginBottom:4}}>⚠️ {c.headline}</div>
                    <div style={{fontSize:9,color:"#7888a0",lineHeight:1.55,marginBottom:5}}>{c.detail}</div>
                    <div style={{fontSize:9,color:"#506070",borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:5}}>📊 {c.exports}</div>
                  </div>
                </foreignObject>
              )}
            </g>
          ))}
        </svg>
      </div>

      {/* Status cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginTop:12}}>
        {gcc.map((c,i)=>(
          <div key={i} onClick={()=>setSel(i)} style={{background:"rgba(0,0,0,0.4)",borderRadius:9,padding:"9px 11px",borderLeft:`3px solid ${c.col}`,cursor:"pointer",transition:"all 0.15s"}}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(20,20,20,0.6)"}
            onMouseLeave={e=>e.currentTarget.style.background="rgba(0,0,0,0.4)"}>

              <span style={{fontSize:14}}>{c.emoji}</span>
              <span style={{fontSize:10,fontWeight:700,color:"#c0d0e0"}}>{c.name}</span>
              <span style={{marginLeft:"auto",fontSize:8,color:c.col,fontWeight:700,fontFamily:"monospace"}}>{c.status}</span>
            </div>
            <div style={{fontSize:9,color:"#ff9966",marginBottom:2}}>⚠️ {c.headline}</div>
            <div style={{fontSize:9,color:"#506070"}}>{c.exports.split("·")[0]}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function IndustrySection(){
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:"1px solid rgba(0,150,200,0.18)",borderRadius:18,padding:"18px 20px",marginBottom:14}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#44aaff",letterSpacing:2,marginBottom:16}}>🏭 INDUSTRIES AT RISK — GLOBAL IMPACT SEVERITY</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
        {industries.map((ind,i)=>(
          <div key={i} style={{background:"rgba(0,0,0,0.35)",borderRadius:10,padding:"11px 13px",border:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:18}}>{ind.icon}</span>
                <span style={{fontSize:12,fontWeight:700,color:"#c0d0e0"}}>{ind.name}</span>
              </div>
              <span style={{fontFamily:"monospace",fontSize:13,fontWeight:800,color:ind.col}}>{ind.impact}%</span>
            </div>
            <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginBottom:7}}>
              <div style={{width:`${ind.impact}%`,height:"100%",background:`linear-gradient(90deg,${ind.col}88,${ind.col})`,borderRadius:3}}/>
            </div>
            <div style={{fontSize:9,color:"#ff8855",marginBottom:3}}>📍 {ind.affected}</div>
            <div style={{fontSize:9,color:"#607080",lineHeight:1.5}}>{ind.detail}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ProjectionSection(){
  const [active,setActive]=useState(0);
  const p=projections[active];
  return(
    <div style={{background:"rgba(4,12,22,0.97)",border:`1px solid ${p.col}33`,borderRadius:18,padding:"18px 20px",marginBottom:14}}>
      <div style={{fontFamily:"monospace",fontSize:12,color:"#ffaa00",letterSpacing:2,marginBottom:16}}>📅 CRISIS DURATION PROJECTIONS — SELECT A SCENARIO</div>
      {/* Tab selector */}
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {projections.map((pr,i)=>(
          <button key={i} onClick={()=>setActive(i)} style={{padding:"8px 16px",borderRadius:10,border:`1px solid ${pr.col}${active===i?"cc":"44"}`,background:active===i?`${pr.col}22`:"rgba(0,0,0,0.3)",color:active===i?pr.col:"#607080",fontFamily:"monospace",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s",letterSpacing:1}}>
            {pr.icon} {pr.week}
          </button>
        ))}
      </div>
      {/* Active scenario */}
      <div style={{animation:"fadeIn 0.25s ease"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{fontSize:22,fontWeight:900,fontFamily:"monospace",color:p.col}}>{p.week}</div>
          <div style={{fontSize:15,fontWeight:700,color:"#d0d8e8"}}>{p.label}</div>
          <div style={{display:"flex",gap:10,marginLeft:"auto",flexWrap:"wrap"}}>
            {[{l:"GDP Impact",v:p.gdp,c:"#ff5555"},{l:"Trade Loss",v:p.trade,c:"#ff8800"},{l:"Energy Price",v:p.energy,c:"#ffcc00"},{l:"Food Prices",v:p.food,c:"#ff9966"}].map((s,i)=>(
              <div key={i} style={{textAlign:"center",background:"rgba(0,0,0,0.3)",padding:"6px 12px",borderRadius:8,border:`1px solid ${s.c}33`}}>
                <div style={{fontSize:14,fontWeight:800,fontFamily:"monospace",color:s.c}}>{s.v}</div>
                <div style={{fontSize:9,color:"#506070",letterSpacing:1}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
          {p.scenarios.map((sc,i)=>(
            <div key={i} style={{background:"rgba(0,0,0,0.35)",borderRadius:10,padding:"12px 14px",borderLeft:`3px solid ${p.col}`,borderTop:"1px solid rgba(255,255,255,0.05)"}}>
              <div style={{fontSize:10,fontWeight:700,color:p.col,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>{sc.region}</div>
              <div style={{fontSize:11,color:"#8898a8",lineHeight:1.65}}>{sc.impact}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Divider({label,col}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,margin:"14px 0 10px"}}>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
      <span style={{fontSize:10,color:"#405060",letterSpacing:2,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
      <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,${col}55,transparent)`}}/>
    </div>
  );
}
